services:
  appointment_facilitator.stats:
    class: Drupal\appointment_facilitator\Service\AppointmentStats
    arguments:
      - '@entity_type.manager'
      - '@entity_field.manager'
      - '@logger.factory'
      - '@cache.default'

  appointment_facilitator.badge_gate:
    class: Drupal\appointment_facilitator\Service\BadgePrerequisiteGate
    arguments:
      - '@entity_type.manager'
      - '@logger.factory'
      - '@?asset_status.availability'

  appointment_facilitator.slack:
    class: Drupal\appointment_facilitator\Service\AppointmentSlackService
    arguments:
      - '@http_client'
      - '@config.factory'
      - '@logger.factory'
